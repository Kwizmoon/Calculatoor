<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auht-container">
      <div id="register-section">
        <h2>Create Account</h2>
        <form id="register-form">
          <input type="text" id="reg-user" placeholder="Username" required>
          <input type="password" id="reg-pass" placeholder="Password" required>
          <Button type="submit">Register</Button>
        </form>
        <p>Already have an account? <a href="#" onclick="toggleAuth()">Login here</a></p>
      </div>

      <div id="login-section" style="display: none;">
        <h2>Login</h2>
        <form id="login-form">
          <input type="text" id="login-user" placeholder="Username" required>
          <input type="password" id="login-pass" placeholder="Password" required>
          <button type="submit">Login</button>
        </form>
        <p>New here? <a href="#" onclick="toggleAuth()">Register here</a></p>
      </div>
    </div>
      
    <script src="auth.js"></script>
</body>
</html>
